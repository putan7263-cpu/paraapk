name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          build-essential ccache libncurses5 \
          libffi-dev libssl-dev

    - name: Install buildozer
      run: pip install buildozer==1.6.0 cython==0.29.37

    - name: Clone p4a at pre-2025 commit (before Python 3.14 requirement)
      run: |
        git clone https://github.com/kivy/python-for-android.git /home/runner/p4a
        cd /home/runner/p4a
        git checkout $(git rev-list -n 1 --before="2025-01-01" HEAD)
        echo "p4a.source_dir = /home/runner/p4a" >> $GITHUB_WORKSPACE/buildozer.spec

    - name: Accept Android SDK licenses
      run: |
        mkdir -p "$ANDROID_HOME/licenses"
        printf '24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n' \
          > "$ANDROID_HOME/licenses/android-sdk-license"
        printf '84831b9409646a918e30573bab4c9c91346d8abd\n' \
          > "$ANDROID_HOME/licenses/android-sdk-preview-license"

    - name: Cache ~/.buildozer (SDK/NDK)
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: buildozer-

    - name: Build APK
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: pspricechecker-debug
        path: bin/*.apk
        retention-days: 14
