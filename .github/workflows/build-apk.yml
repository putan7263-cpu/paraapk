name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master, android-webview]
    paths:
      - "main.py"
      - "server.py"
      - "api/**"
      - "ui/**"
      - "web/**"
      - "buildozer.spec"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache buildozer / p4a artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev cmake \
            libncurses5-dev libncursesw5-dev

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$(readlink -f /usr/lib/jvm/java-17-openjdk-amd64)" >> $GITHUB_ENV

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: psstorebyslava-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
