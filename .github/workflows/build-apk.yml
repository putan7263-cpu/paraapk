name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          build-essential ccache libncurses5 \
          libffi-dev libssl-dev

    - name: Install buildozer
      run: pip install buildozer==1.6.0 cython==0.29.37

    - name: Clone p4a at pre-2025 commit (before Python 3.14 requirement)
      run: |
        git clone https://github.com/kivy/python-for-android.git /home/runner/p4a
        cd /home/runner/p4a
        git checkout $(git rev-list -n 1 --before="2025-01-01" HEAD)
        echo "p4a.source_dir = /home/runner/p4a" >> $GITHUB_WORKSPACE/buildozer.spec

    - name: Accept Android SDK licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        cp -r $ANDROID_HOME/licenses/. ~/.buildozer/android/platform/android-sdk/licenses/

    - name: Build APK
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: pspricechecker-debug
        path: bin/*.apk
        retention-days: 14
