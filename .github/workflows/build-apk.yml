name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master, android-webview]
    paths:
      - "main.py"
      - "server.py"
      - "api/**"
      - "ui/**"
      - "web/**"
      - "buildozer.spec"
      - ".github/workflows/build-apk.yml"

env:
  ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache buildozer / p4a artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev cmake \
            libncurses5-dev libncursesw5-dev wget

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$(readlink -f /usr/lib/jvm/java-17-openjdk-amd64)" >> $GITHUB_ENV

      - name: Setup Android cmdline-tools + accept licenses
        run: |
          set -eux
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd /tmp
          if [ ! -f cmdline-tools.zip ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          fi
          rm -rf cmdline-tools
          unzip -q cmdline-tools.zip
          rm -rf "$ANDROID_HOME/cmdline-tools/latest"
          mv cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"
          # Buildozer ищет sdkmanager по legacy-пути tools/bin — создаём симлинки
          mkdir -p "$ANDROID_HOME/tools/bin"
          ln -sf "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_HOME/tools/bin/sdkmanager"
          ln -sf "$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager" "$ANDROID_HOME/tools/bin/avdmanager"
          # Принимаем все лицензии заранее
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          # Предварительная установка нужных компонентов
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" > /dev/null
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: psstorebyslava-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
